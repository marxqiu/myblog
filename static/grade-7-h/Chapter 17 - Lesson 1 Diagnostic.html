<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch 17 Lesson 1 — Diagnostic</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1923;
    color: #e2e8f0;
    height: 100vh;
    display: grid;
    grid-template-rows: 56px 1fr 64px;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    background: #0a1218;
    border-bottom: 1px solid #1e3044;
  }
  header .title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a90d9;
  }
  header .counter {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    letter-spacing: 1px;
  }

  /* ── MAIN ── */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 32px 48px;
  }

  .question-box {
    text-align: center;
    max-width: 780px;
  }
  .question-box .q-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a90d9;
    margin-bottom: 14px;
  }
  .question-box .q-text {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.4;
    color: #f1f5f9;
  }
  .question-box .q-text .math {
    font-style: italic;
    color: #93c5fd;
  }
  .question-box .q-text sup {
    font-size: 0.65em;
  }

  /* ── OPTIONS GRID ── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 700px;
  }
  .opt {
    position: relative;
    padding: 20px 28px;
    border-radius: 10px;
    border: 2px solid #1e3a52;
    background: #132030;
    cursor: pointer;
    font-size: 20px;
    font-weight: 500;
    color: #cbd5e1;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    user-select: none;
    text-align: left;
  }
  .opt:hover:not(.locked) {
    border-color: #4a90d9;
    background: #1a2f44;
    color: #f1f5f9;
  }
  .opt .letter {
    display: inline-block;
    width: 28px;
    font-size: 13px;
    font-weight: 700;
    color: #4a90d9;
    letter-spacing: 1px;
    margin-right: 6px;
  }
  .opt .math { font-style: italic; color: #93c5fd; }
  .opt sup { font-size: 0.65em; }

  /* ── revealed states ── */
  .opt.correct {
    border-color: #22c55e;
    background: rgba(34,197,94,0.12);
    color: #f1f5f9;
  }
  .opt.correct .letter { color: #22c55e; }
  .opt.wrong {
    border-color: #1e3a52;
    background: #0f1923;
    color: #475569;
  }
  .opt.wrong .letter { color: #334155; }

  /* ── REVEAL BUTTON ── */
  #reveal-btn {
    padding: 14px 44px;
    border-radius: 8px;
    border: none;
    background: #4a90d9;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  #reveal-btn:hover { background: #3a7bc8; }
  #reveal-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── MISCONCEPTION NOTE ── */
  .note-box {
    max-width: 700px;
    width: 100%;
    background: rgba(234,179,8,0.08);
    border: 1px solid rgba(234,179,8,0.25);
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 14px;
    color: #fde68a;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .note-box.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .note-box .note-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #f59e0b;
    font-weight: 700;
    margin-bottom: 5px;
  }

  /* ── BOTTOM NAV ── */
  footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 0 32px;
    background: #0a1218;
    border-top: 1px solid #1e3044;
  }
  .nav-btn {
    padding: 10px 32px;
    border-radius: 6px;
    border: 1px solid #1e3a52;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: #4a90d9;
    color: #4a90d9;
  }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  .dot-nav {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #1e3a52;
    transition: background 0.2s;
  }
  .dot.active { background: #4a90d9; }
  .dot.done   { background: #22c55e; }
</style>
</head>
<body>

<header>
  <span class="title">Chapter 17 · Lesson 1 — Diagnostic</span>
  <span class="counter" id="counter">1 / 3</span>
</header>

<main>
  <div class="question-box">
    <div class="q-label" id="q-label">Question 1</div>
    <div class="q-text" id="q-text"></div>
  </div>

  <div class="options" id="options"></div>

  <button id="reveal-btn" onclick="reveal()">Reveal Answer</button>

  <div class="note-box" id="note-box">
    <div class="note-label">Watch for</div>
    <div id="note-text"></div>
  </div>
</main>

<footer>
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Prev</button>
  <div class="dot-nav" id="dots"></div>
  <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
</footer>

<script>
const questions = [
  {
    text: `Suppose <span class="math">P(E) = 0.3</span>. Which word best describes the probability of event <span class="math">E</span>?`,
    options: ['Impossible', 'Unlikely', 'Likely', 'Certain'],
    answer: 1,
    note: `Students choosing <strong>C (Likely)</strong> may be reading 30% as "a reasonable chance." Reinforce that anything below 0.5 sits on the left half of the scale — it is unlikely.`
  },
  {
    text: `<span class="math">P(A) = 0.7</span>. What is <span class="math">P(A&prime;)</span>?`,
    options: ['0.7', '1.7', '0.3', '−0.7'],
    answer: 2,
    note: `Students choosing <strong>A</strong> have not applied the complement at all. Students choosing <strong>D</strong> are subtracting in the wrong direction: they computed 0 − 0.7 instead of 1 − 0.7.`
  },
  {
    text: `The probability of <em>not</em> winning a prize is 0.94.<br>What is the probability of winning?`,
    options: ['0.94', '1.94', '0.06', '6'],
    answer: 2,
    note: `Students choosing <strong>A</strong> have copied the given probability without applying the complement — they missed the word <em>not</em>. Students choosing <strong>D</strong> have misread 0.06 as 6 (decimal error).`
  }
];

let current = 0;
let revealed = new Array(questions.length).fill(false);

function render() {
  const q = questions[current];
  document.getElementById('q-label').textContent = `Question ${current + 1}`;
  document.getElementById('q-text').innerHTML = q.text;
  document.getElementById('counter').textContent = `${current + 1} / ${questions.length}`;

  const letters = ['A', 'B', 'C', 'D'];
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'opt' + (revealed[current] ? (i === q.answer ? ' correct' : ' wrong') : '') + ' locked';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
    optContainer.appendChild(btn);
  });

  const noteBox = document.getElementById('note-box');
  document.getElementById('note-text').innerHTML = q.note;
  if (revealed[current]) {
    noteBox.classList.add('visible');
  } else {
    noteBox.classList.remove('visible');
  }

  document.getElementById('reveal-btn').disabled = revealed[current];
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === questions.length - 1;

  // dots
  const dotContainer = document.getElementById('dots');
  dotContainer.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : (revealed[i] ? ' done' : ''));
    dotContainer.appendChild(d);
  });
}

function reveal() {
  revealed[current] = true;
  render();
}

function navigate(dir) {
  current = Math.max(0, Math.min(questions.length - 1, current + dir));
  render();
}

render();
</script>
</body>
</html>
