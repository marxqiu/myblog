<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>10 Angles for Screenshot</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px;
    background-color: #ffffff;
    margin: 0;
  }
  .grid-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* 5 columns = 2 rows for 10 items */
    gap: 30px;
  }
  .angle-card {
    position: relative;
    border: 2px solid #eaeaea;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    width: 200px;
    background-color: #ffffff;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .letter-label {
    position: absolute;
    top: 15px;
    left: 20px;
    font-size: 24px;
    font-weight: bold;
    color: #2c3e50;
  }
  svg {
    width: 200px;
    height: 200px;
    background-color: transparent;
  }
</style>
</head>
<body>

<!-- SVG Definitions for Arrowhead -->
<svg width="0" height="0" style="position:absolute;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
        markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c3e50" />
    </marker>
  </defs>
</svg>

<div class="grid-container" id="container"></div>

<script>
  let angles = [
    { degrees: 90 },
    { degrees: 180 },
    { degrees: 360 },
    { degrees: 30 },
    { degrees: 45 },
    { degrees: 60 },
    { degrees: 120 },
    { degrees: 150 },
    { degrees: 225 },
    { degrees: 300 }
  ];

  // Randomize the angles array using Fisher-Yates shuffle
  for (let i = angles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [angles[i], angles[j]] = [angles[j], angles[i]];
  }

  function createSVG(angle, label) {
    const cx = 100, cy = 100;
    const rayLength = 75;
    const arcRadius = 25;
    
    // Convert to radians (negative because SVG y-axis points down)
    const rad = angle.degrees * Math.PI / 180;
    
    // Ray 2 end point
    const endX = cx + rayLength * Math.cos(rad);
    const endY = cy - rayLength * Math.sin(rad);
    
    let arcPath = '';
    
    if (angle.degrees === 360) {
      // Full circle for revolution angle
      arcPath = `<circle cx="${cx}" cy="${cy}" r="${arcRadius}" fill="none" stroke="#e74c3c" stroke-width="2.5" />`;
    } else if (angle.degrees === 90) {
      // Right angle square
      const size = 15;
      arcPath = `<polyline points="${cx+size},${cy} ${cx+size},${cy-size} ${cx},${cy-size}" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-linejoin="miter" />`;
    } else {
      // Arc for other angles
      const arcEndX = cx + arcRadius * Math.cos(rad);
      const arcEndY = cy - arcRadius * Math.sin(rad);
      const largeArcFlag = angle.degrees > 180 ? 1 : 0;
      // sweep flag 0 for counter-clockwise
      arcPath = `<path d="M ${cx + arcRadius} ${cy} A ${arcRadius} ${arcRadius} 0 ${largeArcFlag} 0 ${arcEndX} ${arcEndY}" fill="none" stroke="#e74c3c" stroke-width="2.5" />`;
    }
    
    // Base ray
    const baseRay = `<line x1="${cx}" y1="${cy}" x2="${cx + rayLength}" y2="${cy}" stroke="#2c3e50" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />`;

    // Second ray
    let ray2 = '';
    if (angle.degrees !== 360) {
       ray2 = `<line x1="${cx}" y1="${cy}" x2="${endX}" y2="${endY}" stroke="#2c3e50" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />`;
    } else {
       // Optional: explicit overlapping line for full circle
       ray2 = `<line x1="${cx}" y1="${cy}" x2="${cx + rayLength}" y2="${cy}" stroke="#2c3e50" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />`;
    }
    
    // Center vertex dot
    const centerDot = `<circle cx="${cx}" cy="${cy}" r="4.5" fill="#2c3e50" />`;
    
    return `
      <div class="angle-card">
        <div class="letter-label">${label})</div>
        <svg viewBox="0 0 200 200">
          ${arcPath}
          ${baseRay}
          ${ray2}
          ${centerDot}
        </svg>
      </div>
    `;
  }

  const container = document.getElementById('container');
  // Generate labels a, b, c, d, e, f, g, h, i, j
  const labels = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'i', 'j'];
  
  angles.forEach((angle, index) => {
    container.innerHTML += createSVG(angle, labels[index]);
  });
</script>
</body>
</html>
