<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 7 Mystery Draw</title>
<style>
  :root {
    --bg: #08111f;
    --panel: rgba(15, 23, 42, 0.86);
    --border: rgba(148, 163, 184, 0.18);
    --text: #e5eefb;
    --muted: #8aa0bf;
    --cyan: #63d4ff;
    --gold: #f8c14f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(99, 212, 255, 0.08), transparent 28%),
      radial-gradient(circle at 80% 15%, rgba(139, 92, 246, 0.08), transparent 24%),
      linear-gradient(180deg, #08111f, #0b1629 55%, #0d1320);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .topbar {
    padding: 24px 28px 16px;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    color: var(--cyan);
    font-weight: 700;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 36px;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .sub {
    color: var(--muted);
    font-size: 16px;
  }

  .main {
    padding: 12px 28px 28px;
    display: grid;
    grid-template-columns: 1fr;
    place-items: center;
  }

  .panel {
    width: min(100%, 1100px);
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .card {
    aspect-ratio: 0.92;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background:
      linear-gradient(145deg, rgba(99, 212, 255, 0.12), rgba(139, 92, 246, 0.1)),
      rgba(255,255,255,0.03);
    padding: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0, rgba(255,255,255,0.08) 45%, transparent 100%);
    transform: translateX(-120%);
  }

  .card.active {
    transform: translateY(-4px) scale(1.02);
    border-color: rgba(99, 212, 255, 0.62);
    box-shadow: 0 0 0 1px rgba(99, 212, 255, 0.35), 0 10px 30px rgba(99, 212, 255, 0.18);
  }

  .card.active::before {
    animation: scan 0.45s linear;
  }

  .card.selected {
    transform: translateY(-6px) scale(1.03);
    border-color: rgba(248, 193, 79, 0.78);
    box-shadow: 0 0 0 1px rgba(248, 193, 79, 0.35), 0 14px 36px rgba(248, 193, 79, 0.22);
  }

  @keyframes scan {
    from { transform: translateX(-120%); }
    to { transform: translateX(120%); }
  }

  .card-id {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-mark {
    font-size: 60px;
    text-align: center;
    font-weight: 800;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.9);
  }

  .card-note {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.4;
  }

  .result {
    margin-top: 22px;
    min-height: 36px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.4px;
  }

  .bottombar {
    padding: 0 28px 26px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .btn {
    appearance: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 20px;
    background: var(--panel);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.16s ease, border-color 0.16s ease, opacity 0.16s ease;
  }

  .btn:hover:not(:disabled) {
    transform: translateY(-1px);
    border-color: rgba(99, 212, 255, 0.45);
  }

  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .btn.primary {
    background: linear-gradient(135deg, rgba(99, 212, 255, 0.16), rgba(45, 212, 191, 0.12));
    border-color: rgba(99, 212, 255, 0.38);
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="eyebrow">Chapter 11 - Lesson 7 Hook</div>
    <h1>Mystery Draw</h1>
    <div class="sub">Fake-random card draw that always lands on your prepared question.</div>
  </div>

  <main class="main">
    <section class="panel">
      <div class="card-grid" id="cardGrid"></div>
      <div class="result" id="result">Ready to draw</div>
    </section>
  </main>

  <div class="bottombar">
    <button class="btn primary" id="drawBtn">Draw Card</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>

<script>
  const cards = [
    { id: "A1", name: "Mystery Grid A" },
    { id: "B2", name: "Mystery Grid B" },
    { id: "C3", name: "Mystery Grid C" },
    { id: "D4", name: "Prepared Hook" },
    { id: "E5", name: "Mystery Grid E" },
    { id: "F6", name: "Mystery Grid F" }
  ];

  const targetIndex = 3;
  const cardGrid = document.getElementById("cardGrid");
  const drawBtn = document.getElementById("drawBtn");
  const resetBtn = document.getElementById("resetBtn");
  const result = document.getElementById("result");

  let cardEls = [];
  let drawing = false;

  function buildCards() {
    cardGrid.innerHTML = "";
    cardEls = cards.map((card) => {
      const el = document.createElement("div");
      el.className = "card";
      el.innerHTML = `
        <div class="card-id">${card.id}</div>
        <div class="card-mark">?</div>
        <div class="card-note">Challenge sealed.<br>Unknown difficulty.</div>
      `;
      cardGrid.appendChild(el);
      return el;
    });
  }

  function clearStates() {
    cardEls.forEach((el) => el.classList.remove("active", "selected"));
  }

  function resetAll() {
    drawing = false;
    drawBtn.disabled = false;
    clearStates();
    result.textContent = "Ready to draw";
  }

  function fakeDraw() {
    if (drawing) return;
    drawing = true;
    drawBtn.disabled = true;
    result.textContent = "Shuffling...";

    const path = [];
    let current = Math.floor(Math.random() * cards.length);
    const totalSteps = 18 + Math.floor(Math.random() * 7);

    for (let i = 0; i < totalSteps - 4; i++) {
      current = (current + 1 + Math.floor(Math.random() * (cards.length - 1))) % cards.length;
      path.push(current);
    }

    path.push((targetIndex + cards.length - 2) % cards.length);
    path.push((targetIndex + cards.length - 1) % cards.length);
    path.push((targetIndex + 1) % cards.length);
    path.push(targetIndex);

    let step = 0;
    const base = 85;

    function tick() {
      clearStates();
      cardEls[path[step]].classList.add("active");
      step += 1;

      if (step < path.length) {
        const slowFactor = 1 + step / path.length;
        setTimeout(tick, base * slowFactor);
      } else {
        clearStates();
        cardEls[targetIndex].classList.add("selected");
        result.textContent = "Selected: Prepared Hook";
        drawing = false;
      }
    }

    tick();
  }

  drawBtn.addEventListener("click", fakeDraw);
  resetBtn.addEventListener("click", resetAll);

  buildCards();
</script>
</body>
</html>
