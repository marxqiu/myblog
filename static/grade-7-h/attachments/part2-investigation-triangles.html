<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Part 2 — Investigation Triangles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Georgia', 'Times New Roman', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .page {
    padding: 30px;
    text-align: center;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    color: #222;
    font-weight: 600;
  }
  .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 28px;
  }
  .triangles {
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .tri-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .tri-card h2 {
    font-size: 18px;
    font-weight: 600;
    color: #333;
  }
  .vtx {
    font-family: 'Georgia', serif;
    font-size: 16px;
    font-weight: 700;
    fill: #333;
    text-anchor: middle;
  }
</style>
</head>
<body>
<div class="page">

<h1>Investigation — Measure Each Triangle</h1>
<p class="subtitle">For each triangle, measure all three side lengths and all three angles.</p>

<div class="triangles">

  <!--
    Triangle 1: Acute scalene — sides 7, 8, 9 cm
    AB=9 (base), AC=8, BC=7
    Computed: A=(0,0), B=(9,0), C≈(5.33, 5.96)
    Scale: 25px/cm → A=(0,149), B=(225,149), C=(133,0)
  -->
  <div class="tri-card">
    <svg width="255" height="185" viewBox="-15 -20 285 215">
      <polygon points="0,149 225,149 133,0" fill="#e3f2fd" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="0" cy="149" r="3" fill="#333"/>
      <circle cx="225" cy="149" r="3" fill="#333"/>
      <circle cx="133" cy="0" r="3" fill="#333"/>
      <text class="vtx" x="-12" y="167">A</text>
      <text class="vtx" x="237" y="167">B</text>
      <text class="vtx" x="133" y="-8">C</text>
    </svg>
    <h2>Triangle 1</h2>
  </div>

  <!--
    Triangle 2: Right triangle — sides 6, 8, 10 cm
    AB=10 (hyp), AC=8, BC=6. Right angle at C.
    Computed: A=(0,0), B=(10,0), C=(6.4, 4.8)
    Scale: 25px/cm → A=(0,120), B=(250,120), C=(160,0)
  -->
  <div class="tri-card">
    <svg width="280" height="160" viewBox="-15 -20 310 195">
      <polygon points="0,120 250,120 160,0" fill="#fce4ec" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="0" cy="120" r="3" fill="#333"/>
      <circle cx="250" cy="120" r="3" fill="#333"/>
      <circle cx="160" cy="0" r="3" fill="#333"/>
      <text class="vtx" x="-12" y="138">A</text>
      <text class="vtx" x="262" y="138">B</text>
      <text class="vtx" x="160" y="-8">C</text>
    </svg>
    <h2>Triangle 2</h2>
  </div>

  <!--
    Triangle 3: Obtuse scalene — sides 5, 7, 10 cm
    AB=5 (base), AC=10, BC=7. Obtuse at B≈111.8°.
    Computed: A=(0,0), B=(5,0), C=(7.6, 6.5)
    Scale: 25px/cm → A=(0,162.5), B=(125,162.5), C=(190,0)
  -->
  <div class="tri-card">
    <svg width="225" height="200" viewBox="-15 -20 255 230">
      <polygon points="0,163 125,163 190,0" fill="#e8f5e9" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="0" cy="163" r="3" fill="#333"/>
      <circle cx="125" cy="163" r="3" fill="#333"/>
      <circle cx="190" cy="0" r="3" fill="#333"/>
      <text class="vtx" x="-12" y="180">A</text>
      <text class="vtx" x="137" y="180">B</text>
      <text class="vtx" x="190" y="-8">C</text>
    </svg>
    <h2>Triangle 3</h2>
  </div>

</div>
</div>
</body>
</html>
