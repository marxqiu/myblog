<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classification by Side Lengths</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  .container {
    display: flex;
    gap: 30px;
    align-items: flex-end;
    padding: 20px;
  }
  .triangle-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .triangle-group h2 {
    font-size: 18px;
    font-weight: 600;
    color: #222;
  }
  .tick {
    stroke: #c62828;
    stroke-width: 2;
    stroke-linecap: round;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Scalene: all sides clearly different, asymmetric shape -->
  <div class="triangle-group">
    <svg width="140" height="130" viewBox="0 0 140 130">
      <polygon points="5,125 135,125 95,10"
        fill="#e8f0fe" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>
    <h2>Scalene</h2>
  </div>

  <!--
    Isosceles: vertices (15,125) (115,125) (65,8)
    Left side midpoint ≈ (40, 66.5), right side midpoint ≈ (90, 66.5)
    Tick perpendicular to each side, length ~12px
    Left side dir (50,-117), perp normalized ≈ (0.92, 0.39)
    Right side dir (-50,-117), perp normalized ≈ (0.92, -0.39)
  -->
  <div class="triangle-group">
    <svg width="130" height="130" viewBox="0 0 130 130">
      <polygon points="15,125 115,125 65,8"
        fill="#e8f0fe" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Left side tick at midpoint (40, 66.5) -->
      <line class="tick" x1="34" y1="64" x2="46" y2="69" />
      <!-- Right side tick at midpoint (90, 66.5) -->
      <line class="tick" x1="84" y1="69" x2="96" y2="64" />
    </svg>
    <h2>Isosceles</h2>
  </div>

  <!--
    Equilateral: vertices (10,125) (120,125) (65,12)
    Left midpoint (37.5, 68.5), right midpoint (92.5, 68.5), bottom midpoint (65, 125)
    Left perp ≈ (0.90, 0.44), right perp ≈ (0.90, -0.44)
    Edge dir left ≈ (0.44, -0.90), right ≈ (-0.44, -0.90)
  -->
  <div class="triangle-group">
    <svg width="130" height="130" viewBox="0 0 130 130">
      <polygon points="10,125 120,125 65,12"
        fill="#e8f0fe" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Bottom side: two vertical ticks at (60,125) and (70,125) -->
      <line class="tick" x1="60" y1="121" x2="60" y2="129" />
      <line class="tick" x1="70" y1="121" x2="70" y2="129" />
      <!-- Left side: two ticks near midpoint (37.5, 68.5) offset along edge -->
      <line class="tick" x1="30" y1="71" x2="42" y2="75" />
      <line class="tick" x1="33" y1="63" x2="45" y2="67" />
      <!-- Right side: two ticks near midpoint (92.5, 68.5) offset along edge -->
      <line class="tick" x1="88" y1="75" x2="100" y2="71" />
      <line class="tick" x1="85" y1="67" x2="97" y2="63" />
    </svg>
    <h2>Equilateral</h2>
  </div>

</div>
</body>
</html>
