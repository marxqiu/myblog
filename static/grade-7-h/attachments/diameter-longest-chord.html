<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diameter is the Longest Chord</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  .container {
    padding: 20px;
  }
</style>
</head>
<body>
<div class="container">
  <canvas id="diagram" width="400" height="300"></canvas>
</div>

<script>
const DPR = window.devicePixelRatio || 1;

function setupCanvas(id) {
  const c = document.getElementById(id);
  const w = c.width, h = c.height;
  c.width = w * DPR;
  c.height = h * DPR;
  c.style.width = w + 'px';
  c.style.height = h + 'px';
  const ctx = c.getContext('2d');
  ctx.scale(DPR, DPR);
  return { ctx, w, h };
}

function drawRightAngle(ctx, vertex, p1, p2, size, color) {
  const dx1 = p1[0] - vertex[0], dy1 = p1[1] - vertex[1];
  const len1 = Math.hypot(dx1, dy1);
  const ux1 = dx1/len1, uy1 = dy1/len1;

  const dx2 = p2[0] - vertex[0], dy2 = p2[1] - vertex[1];
  const len2 = Math.hypot(dx2, dy2);
  const ux2 = dx2/len2, uy2 = dy2/len2;

  const c1 = [vertex[0] + ux1*size, vertex[1] + uy1*size];
  const corner = [c1[0] + ux2*size, c1[1] + uy2*size];
  const c2 = [vertex[0] + ux2*size, vertex[1] + uy2*size];

  ctx.beginPath();
  ctx.moveTo(c1[0], c1[1]);
  ctx.lineTo(corner[0], corner[1]);
  ctx.lineTo(c2[0], c2[1]);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8;
  ctx.stroke();
}

const { ctx } = setupCanvas('diagram');
const O = [200, 160];
const radius = 120;

// Draw circle
ctx.beginPath();
ctx.arc(O[0], O[1], radius, 0, 2 * Math.PI);
ctx.fillStyle = '#fef3e0';
ctx.fill();
ctx.strokeStyle = '#222';
ctx.lineWidth = 2.5;
ctx.stroke();

// Define points P, R (diameter)
const P = [O[0] - radius, O[1]];
const R = [O[0] + radius, O[1]];

// Define point Q on circle (angle -120 deg)
const angleQ = -2 * Math.PI / 3;
const Q = [O[0] + radius * Math.cos(angleQ), O[1] + radius * Math.sin(angleQ)];

// Draw right angle at Q
drawRightAngle(ctx, Q, P, R, 20, '#1565c0');

// Draw triangle PQR
ctx.beginPath();
ctx.moveTo(P[0], P[1]);
ctx.lineTo(Q[0], Q[1]);
ctx.lineTo(R[0], R[1]);
ctx.closePath();
ctx.strokeStyle = '#222';
ctx.lineWidth = 2.5;
ctx.lineJoin = 'round';
ctx.stroke();

// Draw diameter PR
ctx.beginPath();
ctx.moveTo(P[0], P[1]);
ctx.lineTo(R[0], R[1]);
ctx.stroke();

// Draw center point O
ctx.beginPath();
ctx.arc(O[0], O[1], 4, 0, 2 * Math.PI);
ctx.fillStyle = '#222';
ctx.fill();

// Draw labels
ctx.font = 'italic 20px Georgia';
ctx.fillStyle = '#222';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';

ctx.fillText('P', P[0] - 15, P[1]);
ctx.fillText('R', R[0] + 18, R[1]);
ctx.fillText('Q', Q[0] - 10, Q[1] - 18);
ctx.fillText('O', O[0], O[1] + 15);

</script>
</body>
</html>
